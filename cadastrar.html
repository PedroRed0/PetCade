<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- ... outros meta e title ... -->

    <!-- Primeiro o script do CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Depois a configuração (incluindo darkMode) -->
    <script>
        tailwind.config = {
            darkMode: 'class',   // ← Essencial
            content: [],
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ecfdf5',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857'
                        },
                        accent: {
                            500: '#f59e0b'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Seu style.css (se tiver) -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-50">
<header class="bg-emerald-600 dark:bg-emerald-800 text-white py-6 shadow-md transition-colors">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
        
        <!-- Logo -->
        <div class="flex items-center gap-3">
            <span class="text-4xl">🐾</span>
            <h1 class="text-3xl font-bold">PetCadê</h1>
        </div>

        <!-- Menu de navegação -->
        <nav class="flex gap-8 text-lg font-medium">
            <a href="index.html" class="hover:underline transition">Início</a>
            <a href="cadastrar.html" class="hover:underline transition">Cadastrar Pet</a>
            <a href="lista.html" class="hover:underline transition">Animais Perdidos</a>
            <a href="mapa.html" class="hover:underline transition">Mapa</a>
        </nav>

        <!-- Botão Toggle Dark Mode -->
        <button id="theme-toggle"
                class="ml-4 p-3 rounded-2xl bg-white/20 hover:bg-white/30 dark:bg-zinc-700 dark:hover:bg-zinc-600 transition-all duration-300">
            <span id="theme-icon" class="text-2xl">☀️</span>
        </button>
    </div>
</header>

    <main class="max-w-4xl mx-auto px-6 py-10">
        <form id="formCadastro" class="bg-white rounded-3xl shadow p-10 space-y-8">
            <div>
                <label class="block text-sm font-medium mb-2">Foto do pet (URL ou link)</label>
                <input type="url" id="foto" class="w-full border rounded-xl px-4 py-3" placeholder="https://exemplo.com/foto.jpg" required>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Nome do pet</label>
                    <input type="text" id="nome" class="w-full border rounded-xl px-4 py-3" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Espécie</label>
                    <select id="especie" class="w-full border rounded-xl px-4 py-3">
                        <option value="Cachorro">Cachorro</option>
                        <option value="Gato">Gato</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Raça / Descrição</label>
                <input type="text" id="raca" class="w-full border rounded-xl px-4 py-3" placeholder="Vira-lata, Siames, etc.">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Descrição detalhada</label>
                <textarea id="descricao" rows="4" class="w-full border rounded-xl px-4 py-3" placeholder="Cor, tamanho, coleira, características..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Última localização aproximada</label>
                    <button type="button" id="btnLocalizacao" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-medium hover:bg-emerald-700">
                        📍 Usar minha localização atual
                    </button>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Recompensa (R$)</label>
                    <input type="number" id="recompensa" class="w-full border rounded-xl px-4 py-3" placeholder="0 se não houver">
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-2xl text-xl font-semibold hover:bg-emerald-700 transition">
                Cadastrar Pet Desaparecido
            </button>
        </form>
    </main>

    <script src="js/storage.js"></script>
    <script>
        const form = document.getElementById('formCadastro');
        const btnLocal = document.getElementById('btnLocalizacao');

        btnLocal.addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('lat').value = pos.coords.latitude;
                    document.getElementById('lng').value = pos.coords.longitude;
                    alert('Localização capturada com sucesso! ✅');
                }, () => alert('Não foi possível obter a localização.'));
            }
        });

        form.addEventListener('submit', e => {
            e.preventDefault();
            const pet = {
                id: Date.now(),
                foto: document.getElementById('foto').value || 'https://picsum.photos/id/237/400/300',
                nome: document.getElementById('nome').value,
                especie: document.getElementById('especie').value,
                raca: document.getElementById('raca').value,
                descricao: document.getElementById('descricao').value,
                ultimaLocalizacao: {
                    lat: parseFloat(document.getElementById('lat').value) || -23.5505,
                    lng: parseFloat(document.getElementById('lng').value) || -46.6333
                },
                recompensa: parseFloat(document.getElementById('recompensa').value) || 0,
                data: new Date().toISOString()
            };

            salvarPet(pet);
            alert('Pet cadastrado com sucesso! 🐾');
            window.location.href = 'lista.html';
        });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
